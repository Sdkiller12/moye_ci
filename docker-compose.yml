version: '3.8'

services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: moye-libretranslate
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=fr,en
      - LT_THREADS=4
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    build: .
    container_name: moye-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      - libretranslate
    volumes:
      - ./uploads:/app/uploads
